stages:
  - prepare
  - lint
  - test
  - typecheck
  - build

default:
  image: node:20-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.33.2 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules
      - .turbo
    policy: pull-push

variables:
  CI: "true"
  NODE_ENV: "test"
  APP_BASE_URL: "http://127.0.0.1:3001"
  DATABASE_URL: "postgresql://devatlas:devatlas@postgres:5432/devatlas?schema=public"
  NEXT_PUBLIC_API_BASE_URL: "http://127.0.0.1:3001"
  NEXT_PUBLIC_SITE_URL: "http://127.0.0.1:3000"

prepare:
  stage: prepare
  script:
    - pnpm doctor
  artifacts:
    when: always
    paths:
      - .turbo
  only:
    - main
    - develop
    - merge_requests

lint:
  stage: lint
  script:
    - pnpm verify:web
  needs:
    - prepare
  only:
    - main
    - develop
    - merge_requests

test:
  stage: test
  script:
    - pnpm verify:api
  needs:
    - prepare
  only:
    - main
    - develop
    - merge_requests

typecheck:
  stage: typecheck
  script:
    - pnpm typecheck
  needs:
    - prepare
  only:
    - main
    - develop
    - merge_requests

build:
  stage: build
  script:
    - pnpm lint
    - pnpm typecheck
    - pnpm test
    - pnpm build
  needs:
    - lint
    - test
    - typecheck
  only:
    - main
    - develop
    - merge_requests
  artifacts:
    when: on_success
    paths:
      - apps/web/.next
      - apps/api/dist
