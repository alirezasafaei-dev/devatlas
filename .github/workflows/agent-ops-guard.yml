name: Agent Ops Guard

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      include-smoke:
        description: Run search:smoke as part of pre-merge guard (optional)
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  actions: read

jobs:
  premerge:
    name: Agent Guard Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run agent ops (light)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/agent-ops.mjs \
            --skip-doctor \
            --skip-verify \
            --skip-deepseek \
            --report /tmp/agent-ops-report.json \
            --json \
            $( ["${{ github.event.inputs.include-smoke }}" = "true" ] && echo "--smoke" ) | tee /tmp/agent-ops-output.log

      - name: Run quality slice
        run: |
          pnpm lint:api
          pnpm lint:web
          pnpm typecheck:api
          pnpm typecheck:web

      - name: Upload guard report
        uses: actions/upload-artifact@v4
        with:
          name: agent-ops-guard-report
          path: |
            /tmp/agent-ops-report.json
            /tmp/agent-ops-output.log
          if-no-files-found: error
