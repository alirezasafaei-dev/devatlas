name: GapCode Index

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-index:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate GapCode metadata
        run: pnpm gapcode:index

      - name: Generate GapCode index metrics
        run: pnpm gapcode:index:metrics

      - name: Upload GapCode metadata
        uses: actions/upload-artifact@v4
        with:
          name: gapcode-index
          path: |
            .gapcode/repo-index.json
            .gapcode/index-metrics.json
            .gapcode/deps-map.json
            .gapcode/heavy-paths.json
            .gapcode/policies.json
