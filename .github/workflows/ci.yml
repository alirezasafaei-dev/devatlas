name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify-fast:
    name: Verify Fast
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: devatlas
          POSTGRES_PASSWORD: devatlas
          POSTGRES_DB: devatlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_BASE_URL: http://127.0.0.1:3001
      DATABASE_URL: postgresql://devatlas:devatlas@127.0.0.1:5432/devatlas?schema=public
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Doctor
        run: pnpm doctor

      - name: Verify API
        run: pnpm verify:api

      - name: Verify Web
        run: pnpm verify:web

  verify-release:
    name: Verify Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify-fast
    if: github.event_name == 'push'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: devatlas
          POSTGRES_PASSWORD: devatlas
          POSTGRES_DB: devatlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_BASE_URL: http://127.0.0.1:3001
      DATABASE_URL: postgresql://devatlas:devatlas@127.0.0.1:5432/devatlas?schema=public
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Repository Release Gate
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build
